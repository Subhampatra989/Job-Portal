<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Chahiye?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Job Chahiye?</div>
        <ul class="nav-links">
            <li>Jobs</li>
            <li>Companies</li>
            <li>Services</li>
            <li>Login</li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Find Your Dream Job</h1>
        <p>Search from thousands of opportunities</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by title, company or location">
            <button id="searchBtn">Search</button>
        </div>
    </section>

    <!-- Post Job Section -->
    <section class="post-job">
        <h2>Post a Job</h2>
        <input type="text" id="jobTitle" placeholder="Job Title">
        <input type="text" id="companyName" placeholder="Company Name">
        <input type="text" id="jobLocation" placeholder="Location">
        <button id="addJobBtn">Post Job</button>
    </section>

    <!-- Jobs Section -->
    <section class="jobs">
        <h2>Featured Jobs</h2>
        <div id="jobList"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
